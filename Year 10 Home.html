<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year 10 · THSConline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --indigo:      #4f46e5;
    --indigo-100:  #e0e7ff;
    --indigo-50:   #eef2ff;
    --slate-900:   #0f172a;
    --slate-600:   #475569;
    --slate-400:   #94a3b8;
    --slate-200:   #e2e8f0;
    --slate-100:   #f1f5f9;
    --white:       #ffffff;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--white);
    color: var(--slate-900);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--slate-200);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--indigo);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-text {
    font-size: 1rem;
    font-weight: 600;
    color: var(--slate-900);
  }

  .upload-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    border: 1.5px solid var(--slate-200);
    border-radius: 8px;
    padding: 0.45rem 1rem;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--slate-900);
    background: var(--white);
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.15s;
  }
  .upload-btn:hover { border-color: var(--indigo); color: var(--indigo); }

  .tabnav {
    background: #0f172a;
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.6rem 2rem;
    overflow-x: auto;
    border-bottom: 3px solid var(--indigo);
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-size: 0.875rem;
    font-weight: 500;
    color: #94a3b8;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .tab:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .tab.active { background: var(--indigo); color: var(--white); }
  .tab svg { opacity: 0.7; flex-shrink: 0; }
  .tab.active svg { opacity: 1; }

  .content {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 2rem 3rem;
  }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 1.25rem 0 0;
    font-size: 0.8rem;
    color: var(--slate-400);
  }
  .breadcrumb a { color: var(--slate-400); text-decoration: none; }
  .breadcrumb a:hover { color: var(--indigo); }
  .breadcrumb .current { color: var(--indigo); font-weight: 500; }

  .page-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.25rem 0 1.5rem;
  }

  .header-icon {
    width: 52px;
    height: 52px;
    background: var(--indigo-50);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--indigo);
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--slate-900);
    line-height: 1.2;
  }

  .header-underline {
    width: 36px;
    height: 3px;
    background: var(--indigo);
    border-radius: 2px;
    margin-top: 0.4rem;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 1.25rem;
  }
  .search-wrap svg {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--slate-400);
    pointer-events: none;
  }
  .subject-search {
    width: 100%;
    height: 44px;
    border: 1.5px solid var(--slate-200);
    border-radius: 10px;
    padding: 0 1rem 0 2.6rem;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.9rem;
    color: var(--slate-900);
    background: var(--slate-100);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .subject-search::placeholder { color: var(--slate-400); }
  .subject-search:focus {
    background: var(--white);
    border-color: var(--indigo);
    box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
  }

  .no-results {
    display: none;
    text-align: center;
    padding: 2.5rem 0;
    color: var(--slate-400);
    font-size: 0.9rem;
  }

  .subjects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 0.65rem;
  }

  .subject-card {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--white);
    border: 1.5px solid var(--slate-200);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    text-decoration: none;
    color: var(--slate-900);
    font-size: 0.875rem;
    font-weight: 500;
    transition: border-color 0.15s, box-shadow 0.15s;
    line-height: 1.3;
  }
  .subject-card:hover {
    border-color: var(--indigo);
    box-shadow: 0 2px 12px rgba(79,70,229,0.08);
  }
  .subject-card.hidden { display: none; }

  .subject-dot {
    width: 10px;
    height: 28px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .subjects-list {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 0.1rem 2rem;
  }

  .subject-list-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.3rem 0;
    text-decoration: none;
    color: var(--indigo);
    font-size: 0.875rem;
    transition: opacity 0.15s;
  }
  .subject-list-item:hover { opacity: 0.75; }
  .subject-list-item.hidden { display: none; }

  .folder-icon {
    width: 20px;
    height: 16px;
    flex-shrink: 0;
    border-radius: 2px 3px 3px 3px;
    position: relative;
  }
  .folder-icon::before {
    content: '';
    position: absolute;
    top: -4px;
    left: 0;
    width: 8px;
    height: 4px;
    border-radius: 2px 2px 0 0;
    background: inherit;
    filter: brightness(1.15);
  }

  body.list-view .subjects-grid { display: none; }
  body.list-view .subjects-list { display: grid; }

  .page-footer {
    border-top: 1px solid var(--slate-200);
    padding: 1rem 2rem;
  }

  .change-view {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.8rem;
    color: var(--indigo);
    cursor: pointer;
    font-weight: 500;
    background: none;
    border: none;
    font-family: inherit;
  }

  .bg-blob {
    position: fixed;
    bottom: -80px;
    right: -60px;
    width: 340px;
    height: 260px;
    background: var(--indigo-100);
    border-radius: 50%;
    opacity: 0.4;
    pointer-events: none;
    filter: blur(60px);
    z-index: 0;
  }

  @media (max-width: 640px) {
    .topnav, .tabnav, .page-footer { padding-left: 1rem; padding-right: 1rem; }
    .content { padding-left: 1rem; padding-right: 1rem; }
    .subjects-list { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="bg-blob"></div>

<nav class="topnav">
  <a href="index.html" class="nav-logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="2" width="6" height="9" rx="1.5" fill="white" opacity="0.95"/>
        <rect x="10" y="2" width="6" height="5" rx="1.5" fill="white" opacity="0.6"/>
        <rect x="10" y="9" width="6" height="7" rx="1.5" fill="white" opacity="0.6"/>
        <rect x="2" y="13" width="6" height="3" rx="1.5" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <span class="logo-text">thsconline</span>
  </a>
  <a href="#" class="upload-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Upload Files
  </a>
</nav>

<div class="tabnav">
  <a href="index.html" class="tab">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    THSC Home
  </a>
  <a href="Year 9 Home.html" class="tab">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Year 9
  </a>
  <a href="Year 10 Home.html" class="tab active">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Year 10
  </a>
  <a href="Year 11 Home.html" class="tab">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Year 11 – Preliminary
  </a>
  <a href="Year 12 Home.html" class="tab">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Year 12 – HSC
  </a>
</div>

<div class="content">

  <div class="breadcrumb">
    <a href="index.html">thsconline</a>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    <span class="current">Year 10</span>
  </div>

  <div class="page-header">
    <div class="header-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    <div class="header-text">
      <h1>Year 10 Resources</h1>
      <div class="header-underline"></div>
    </div>
  </div>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="subject-search" type="search" id="subjectSearch" placeholder="Filter subjects…" aria-label="Filter subjects">
  </div>

  <!-- CARD VIEW -->
  <div class="subjects-grid" id="subjectsGrid">
    <a href="Work in progress 10.html" class="subject-card" data-name="maths mathematics"><span class="subject-dot" style="background:#ef4444;"></span>Maths</a>
    <a href="Work in progress 10.html" class="subject-card" data-name="science"><span class="subject-dot" style="background:#8b5cf6;"></span>Science</a>
  </div>

  <!-- LIST VIEW -->
  <div class="subjects-list" id="subjectsList">
    <a href="under-development.html" class="subject-list-item" data-name="maths mathematics"><span class="folder-icon" style="background:#ef4444;"></span>Maths</a>
    <a href="under-development.html" class="subject-list-item" data-name="science"><span class="folder-icon" style="background:#8b5cf6;"></span>Science</a>
  </div>

  <div class="no-results" id="noResults">No subjects match your search.</div>

</div>

<div class="page-footer">
  <button class="change-view" id="changeViewBtn">
    Change View
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
  </button>
</div>

<script>
  const search = document.getElementById('subjectSearch');
  const noResults = document.getElementById('noResults');
  const changeViewBtn = document.getElementById('changeViewBtn');
  let isListView = false;

  search.addEventListener('input', () => {
    const query = search.value.toLowerCase().trim();
    document.querySelectorAll('.subject-card, .subject-list-item').forEach(el => {
      const name = (el.dataset.name || el.textContent).toLowerCase();
      el.classList.toggle('hidden', !name.includes(query));
    });
    const activeClass = isListView ? '.subject-list-item' : '.subject-card';
    const visible = document.querySelectorAll(activeClass + ':not(.hidden)').length;
    noResults.style.display = visible === 0 ? 'block' : 'none';
  });

  changeViewBtn.addEventListener('click', () => {
    isListView = !isListView;
    document.body.classList.toggle('list-view', isListView);
    changeViewBtn.innerHTML = isListView
      ? 'Change View <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>'
      : 'Change View <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
    const activeClass = isListView ? '.subject-list-item' : '.subject-card';
    const visible = document.querySelectorAll(activeClass + ':not(.hidden)').length;
    noResults.style.display = visible === 0 ? 'block' : 'none';
  });
</script>

</body>
</html>

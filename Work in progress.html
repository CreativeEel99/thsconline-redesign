<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --indigo:     #4f46e5;
    --indigo-100: #e0e7ff;
    --indigo-50:  #eef2ff;
    --slate-900:  #0f172a;
    --slate-600:  #475569;
    --slate-400:  #94a3b8;
    --slate-200:  #e2e8f0;
    --slate-100:  #f1f5f9;
    --white:      #ffffff;
    --lavender:   #f5f3ff;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--lavender);
    color: var(--slate-900);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: var(--white);
    border-bottom: 1px solid var(--slate-200);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--indigo);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-text {
    font-size: 1rem;
    font-weight: 600;
    color: var(--slate-900);
  }

  /* TABNAV */
  .tabnav {
    background: #0f172a;
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.6rem 2rem;
    overflow-x: auto;
    border-bottom: 3px solid var(--indigo);
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-size: 0.875rem;
    font-weight: 500;
    color: #94a3b8;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .tab:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .tab.active { background: var(--indigo); color: var(--white); }
  .tab svg { opacity: 0.7; flex-shrink: 0; }
  .tab.active svg { opacity: 1; }

  /* MAIN */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
  }

  .card {
    background: var(--white);
    border: 1.5px solid var(--slate-200);
    border-radius: 18px;
    padding: 3rem 2.5rem;
    text-align: center;
    max-width: 460px;
    width: 100%;
  }

  .icon-wrap {
    width: 64px;
    height: 64px;
    background: var(--indigo-50);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    color: var(--indigo);
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--slate-900);
    margin-bottom: 0.75rem;
  }

  p {
    font-size: 0.9rem;
    color: var(--slate-600);
    line-height: 1.65;
    margin-bottom: 2rem;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--indigo);
    color: var(--white);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    padding: 0.6rem 1.25rem;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.15s;
  }

  .back-btn:hover { background: #3730a3; }
</style>
</head>
